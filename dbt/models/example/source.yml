version: 2

sources:
  - name: aqi_source
    description: "AQI project raw and processed tables in BigQuery"
    database: project_id
    schema: aqi_dataset

    tables:
      - name: aqi_ext
        description: "External AQI CSV data from GCS"

      - name: stations_ext
        description: "External stations metadata"
        columns:
          - name: file_name
            tests:
              - not_null
              - unique

      - name: aqi_fact
        description: "Processed fact table with AQI measurements"
        columns:
          - name: station_code
            tests:
              - not_null
          - name: datetime
            tests:
              - not_null
          - name: parameter
            tests:
              - not_null
          - name: value
            tests:
              - not_null

      - name: stations_info
        description: "Cleaned stations dimension table"
        columns:
          - name: file_name
            tests:
              - not_null
              - unique
          - name: city
            tests:
              - not_null
          - name: state
            tests:
              - not_null

      - name: aqi_enriched
        description: "Joined AQI + station metadata"
        columns:
          - name: station_code
            tests:
              - not_null
          - name: city
            tests:
              - not_null
          - name: parameter
            tests:
              - not_null
          - name: value
            tests:
              - not_null
